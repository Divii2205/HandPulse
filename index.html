<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Hand Tracking AR</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #050510;
        color: white;
        font-family: sans-serif;
      }
      .video-container {
        position: absolute;
        width: 100vw;
        height: 100vh;
      }
      .input_video {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        z-index: 0;
      }
      canvas {
        position: absolute;
        width: 100%;
        height: 100%;
        transform: scaleX(-1);
      }
      #bgCanvas {
        z-index: 1;
      }
      #mainCanvas {
        z-index: 999;
      }
      #startOverlay {
        position: absolute;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <div id="startOverlay">
      <h1>NEON AURA AR</h1>
      <p>Click to start</p>
      <button id="startBtn">Enter</button>
    </div>

    <div class="video-container">
      <video class="input_video" autoplay playsinline></video>
      <canvas id="bgCanvas"></canvas>
      <canvas id="mainCanvas"></canvas>
    </div>

    <script>
      // ===== CONFIG =====
      const isLocal =
        location.hostname === "localhost" || location.hostname === "127.0.0.1";
      const isLowPower = navigator.hardwareConcurrency <= 4;

      const CAM_WIDTH = isLocal ? 960 : 640;
      const CAM_HEIGHT = isLocal ? 720 : 480;
      const PROCESS_INTERVAL = isLocal ? 35 : isLowPower ? 60 : 45;
      const START_DELAY = isLocal ? 0 : 3000;

      // ===== GLOBALS =====
      const videoElement = document.querySelector(".input_video");
      const bgCanvas = document.getElementById("bgCanvas");
      const mainCanvas = document.getElementById("mainCanvas");
      const bgCtx = bgCanvas.getContext("2d");
      const ctx = mainCanvas.getContext("2d");

      let width = window.innerWidth;
      let height = window.innerHeight;

      let currentHands = [];
      let lastProcessTime = 0;
      let frameSkip = 0;

      // ===== INIT =====
      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        bgCanvas.width = width;
        mainCanvas.width = width;
        bgCanvas.height = height;
        mainCanvas.height = height;
      }
      window.addEventListener("resize", resize);
      resize();

      videoElement.onloadedmetadata = resize;

      // ===== START =====
      document.getElementById("startBtn").addEventListener("click", () => {
        const overlay = document.getElementById("startOverlay");

        overlay.innerHTML = `
    <h1>Initializing...</h1>
    <p>Preparing experience...</p>
  `;

        initMediaPipe();

        setTimeout(() => {
          overlay.classList.add("hidden");
          requestAnimationFrame(renderLoop);
        }, START_DELAY);
      });

      // ===== MEDIAPIPE =====
      function initMediaPipe() {
        const hands = new Hands({
          locateFile: (file) =>
            `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
        });

        hands.setOptions({
          maxNumHands: 2,
          minDetectionConfidence: 0.7,
          minTrackingConfidence: 0.7,
        });

        hands.onResults((results) => {
          currentHands = results.multiHandLandmarks || [];
        });

        const camera = new Camera(videoElement, {
          onFrame: async () => {
            const now = performance.now();
            if (now - lastProcessTime > PROCESS_INTERVAL) {
              await hands.send({ image: videoElement });
              lastProcessTime = now;
            }
          },
          width: CAM_WIDTH,
          height: CAM_HEIGHT,
        });

        camera.start();
      }

      // ===== RENDER =====
      function renderLoop() {
        requestAnimationFrame(renderLoop);

        // fade
        ctx.globalCompositeOperation = "destination-out";
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        if (frameSkip++ % 2 === 0) {
          ctx.fillRect(0, 0, width, height);
        }

        ctx.globalCompositeOperation = "screen";

        currentHands.forEach((hand) => {
          hand.forEach((pt) => {
            const x = pt.x * width;
            const y = pt.y * height;

            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI * 2);
            ctx.fillStyle = "#00ffcc";
            ctx.fill();
          });
        });

        ctx.globalCompositeOperation = "source-over";
      }

      console.log({
        mode: isLocal ? "LOCAL" : "DEPLOYED",
        resolution: CAM_WIDTH + "x" + CAM_HEIGHT,
        interval: PROCESS_INTERVAL,
      });
    </script>
  </body>
</html>
